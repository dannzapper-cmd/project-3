# InvForge — InvenTree base stack (Docker Compose)
#
# This file follows the official InvenTree production Docker Compose pattern:
# https://docs.inventree.org/en/stable/start/docker/
# Source reference: InvenTree v1.3.2 contrib/container/docker-compose.yml
#
# Service classification:
#   [InvenTree Base]  inventree-db, inventree-cache, inventree-server,
#                     inventree-worker, inventree-proxy
#   [InvForge Future] AI Operations API, MLflow, Feast, Grafana, etc.
#                     (added in PR-02+ as sidecar services — NOT in this file)
#
# Configuration lives in app/.env (copy from .env.example). Do not edit this
# file unless you understand the InvenTree stack.

services:
  # [InvenTree Base] PostgreSQL database backend
  inventree-db:
    image: postgres:17
    container_name: inventree-db
    expose:
      - ${INVENTREE_DB_PORT:-5432}/tcp
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdb
      - POSTGRES_USER=${INVENTREE_DB_USER:?You must provide the 'INVENTREE_DB_USER' variable in the .env file}
      - POSTGRES_PASSWORD=${INVENTREE_DB_PASSWORD:?You must provide the 'INVENTREE_DB_PASSWORD' variable in the .env file}
      - POSTGRES_DB=${INVENTREE_DB_NAME:?You must provide the 'INVENTREE_DB_NAME' variable in the .env file}
    volumes:
      - ${INVENTREE_EXT_VOLUME:?You must specify the 'INVENTREE_EXT_VOLUME' variable in the .env file!}:/var/lib/postgresql/data/:z
    restart: unless-stopped

  # [InvenTree Base] Redis cache manager (optional but enabled by default)
  inventree-cache:
    image: redis:7-alpine
    container_name: inventree-cache
    env_file:
      - .env
    expose:
      - ${INVENTREE_CACHE_PORT:-6379}
    volumes:
      - ${INVENTREE_EXT_VOLUME}/redis:/data
    restart: always

  # [InvenTree Base] InvenTree web server (gunicorn)
  inventree-server:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-server
    expose:
      - ${INVENTREE_WEB_PORT:-8000}
    depends_on:
      - inventree-db
      - inventree-cache
    env_file:
      - .env
    environment:
      INVENTREE_SERVER: http://inventree-server:${INVENTREE_WEB_PORT}
    volumes:
      - ${INVENTREE_EXT_VOLUME}:/home/inventree/data:z
    restart: unless-stopped

  # [InvenTree Base] Background worker (django-q)
  inventree-worker:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-worker
    command: invoke worker
    depends_on:
      - inventree-server
    env_file:
      - .env
    volumes:
      - ${INVENTREE_EXT_VOLUME}:/home/inventree/data:z
    restart: unless-stopped

  # [InvenTree Base] Caddy reverse proxy and static/media file server
  inventree-proxy:
    container_name: inventree-proxy
    image: caddy:alpine
    restart: always
    depends_on:
      - inventree-server
    ports:
      - ${INVENTREE_HTTP_PORT:-80}:80
      - ${INVENTREE_HTTPS_PORT:-443}:443
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ${INVENTREE_EXT_VOLUME}/static:/var/www/static:z
      - ${INVENTREE_EXT_VOLUME}/media:/var/www/media:z
      - ${INVENTREE_EXT_VOLUME}:/var/log:z
      - ${INVENTREE_EXT_VOLUME}:/data:z
      - ${INVENTREE_EXT_VOLUME}:/config:z
