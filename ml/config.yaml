# PR-03 demand forecasting baseline configuration

data:
  synthetic_dir: data/synthetic/output
  demand_history_file: demand_history.csv
  parts_file: parts.csv

split:
  train_fraction: 0.75

lightgbm:
  objective: regression
  metric: mae
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  n_estimators: 200
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  verbose: -1

statsforecast:
  season_length: 7
  regular_models:
    - AutoETS
    - SeasonalNaive
  intermittent_models:
    - CrostonClassic
    - CrostonSBA

mlflow:
  tracking_uri: mlruns
  experiment_name: demand_forecast_baseline

shap:
  sample_size: 200
  random_state: 42

decision:
  artifact_dir: artifacts/decision
  service_level: 0.95
  quantile_alphas:
    - 0.1
    - 0.5
    - 0.9
  # PR-04 inventory metadata is applied after forecasting; lead time is excluded
  # from the decision-layer quantile models without changing PR-03 baseline behavior.
  forecast_excluded_features:
    - lead_time_days
  eoq:
    order_cost: 50.0
    holding_cost_rate: 0.20
  cost:
    understock_cost_multiplier: 1.0
    naive_policy: lag_7
  risk:
    low_threshold: 0.20
    high_threshold: 0.50
  statsforecast_interval_reference:
    enabled: true
    level: 80
  mlflow:
    experiment_name: decision_intelligence
    enabled: true
