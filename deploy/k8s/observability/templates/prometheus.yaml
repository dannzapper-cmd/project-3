{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    # Local/dev Prometheus for the InvForge AI layer. Scrapes ONLY the AI
    # Operations API /metrics in {{ .Values.aiApi.namespace }}. Not production.
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}
      external_labels:
        project: invforge
        environment: local-kind
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              {{- if .Values.alertmanager.enabled }}
                - alertmanager:{{ .Values.alertmanager.port }}
              {{- end }}
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: {{ .Values.aiApi.job }}
        metrics_path: /metrics
        static_configs:
          - targets:
              - {{ include "obs.aiApiTarget" . }}
            labels:
              service: invforge-ai-ops-api
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:{{ .Values.prometheus.port }}
  alerts.yml: |
    # All three rules use ONLY verified PR-07 metrics (observability/metrics.py).
    groups:
      - name: invforge-ai
        rules:
          # 1) AI API target down (standard Prometheus `up`).
          - alert: InvForgeAIDown
            expr: up{job="{{ .Values.aiApi.job }}"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "InvForge AI API is down"
              description: "Prometheus cannot scrape the AI API for >1m (up==0)."
          # 2) Dataset drift detected (invforge_drift_detected: 1=drift,0=no,-1=unknown).
          #    for: 30s ~= 2 evaluations at a 15s evaluation_interval.
          - alert: InvForgeDriftDetected
            expr: invforge_drift_detected == 1
            for: 30s
            labels:
              severity: warning
            annotations:
              summary: "InvForge dataset drift detected"
              description: "invforge_drift_detected == 1 for >2 evaluations."
          # 3) A required decision artifact is missing.
          - alert: InvForgeArtifactMissing
            expr: invforge_artifact_available{artifact="decision_summary"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "InvForge decision_summary artifact missing"
              description: "invforge_artifact_available{artifact=decision_summary}==0 for >5m."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "obs.labels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
      annotations:
        checksum/config: {{ toYaml $.Values | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.prometheus.retention }}
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: {{ .Values.prometheus.port }}
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
            items:
              - key: prometheus.yml
                path: prometheus.yml
        - name: rules
          configMap:
            name: prometheus-config
            items:
              - key: alerts.yml
                path: alerts.yml
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: prometheus
  ports:
    - name: http
      port: {{ .Values.prometheus.port }}
      targetPort: http
{{- end }}
