{{- if .Values.alertmanager.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
data:
  alertmanager.yml: |
    # Routes every alert to the in-cluster local webhook receiver. To plug in
    # Slack/PagerDuty later, add a receiver with the appropriate *_configs and
    # point the route at it (no external service is used here — see ADR 003).
    route:
      receiver: local-webhook
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 5m
    receivers:
      - name: local-webhook
        webhook_configs:
          - url: http://alert-webhook-receiver:{{ .Values.webhookReceiver.port }}/alert
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: alertmanager
  template:
    metadata:
      labels:
        {{- include "obs.labels" . | nindent 8 }}
        app.kubernetes.io/component: alertmanager
      annotations:
        checksum/config: {{ toYaml $.Values | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: {{ .Values.alertmanager.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - name: http
              containerPort: {{ .Values.alertmanager.port }}
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.alertmanager.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "obs.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: alertmanager
  ports:
    - name: http
      port: {{ .Values.alertmanager.port }}
      targetPort: http
{{- end }}
