# InvForge AI Operations Layer — default Helm values (PR-11A).
#
# These defaults are tuned for a local kind cluster on an 8 GB laptop. For the
# local workflow also pass -f values-local.yaml (sets imagePullPolicy to
# IfNotPresent and ClusterIP, both REQUIRED for kind to use locally loaded
# images). See docs/runbooks/k8s-startup.md.

# Namespace where the AI layer is deployed. The chart can create it (see
# namespaces.create) so `helm upgrade --install ... -n invforge-ai --create-namespace`
# is not strictly required, but using --create-namespace is also fine.
namespaces:
  # Primary AI layer namespace.
  ai: invforge-ai
  # Reserved placeholder for PR-11B observability (LGTM, OTel Collector,
  # AlertManager). NOT used to deploy anything in PR-11A.
  observability: invforge-observability
  # Let the chart manage namespace objects (labels + optional creation).
  create: true
  # Create the reserved observability namespace as an empty placeholder.
  createObservability: false

# --- AI Operations API (the only workload actually deployed in PR-11A) -------
aiApi:
  enabled: true
  replicaCount: 1
  image:
    # Must match Makefile AI_IMAGE (invforge-ai-ops:local). The image is built
    # with `make docker-build-ai` and loaded into kind with `make k8s-load-images`.
    repository: invforge-ai-ops
    tag: local
    # Overridden to IfNotPresent by values-local.yaml for kind (NON-NEGOTIABLE
    # locally: Always would force a registry pull and fail for local images).
    pullPolicy: IfNotPresent
  service:
    # ClusterIP only: access is via `kubectl port-forward`, never LoadBalancer
    # or NodePort on a local kind cluster. See NOTES.txt.
    type: ClusterIP
    port: 8001
  # The container binds uvicorn to ${PORT}; keep targetPort aligned.
  containerPort: 8001
  # Env passed via ConfigMap (non-secret) and Secret (placeholders only).
  # demo keeps /health at 200 even without local MLOps artifacts, so probes are
  # reliable in a fresh cluster (matches the PR-10 Dockerfile default).
  env:
    INVFORGE_ENV: demo
    INVFORGE_DEMO_MODE: "true"
    INVFORGE_ALLOW_MUTATIONS: "false"
    INVFORGE_API_PORT: "8001"
    PORT: "8001"
  # Conservative local requests/limits (fits an 8 GB laptop comfortably).
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Probes hit the confirmed /health endpoint (api/main.py).
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  # Non-root: matches the Dockerfile appuser (uid 10001).
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

# --- BentoML model server (DISABLED in PR-11A) ------------------------------
# The BentoML *entrypoint* exists (mlops/service.py: DemandForecastService), but
# no container image exists yet. Building it is a one-command step deferred to
# after PR-11A merge:
#   make bento-build && make bento-containerize && make k8s-load-bento
# Until that image exists, keep enabled: false. Flipping it to true without the
# image would leave pods in ErrImagePull. Blue-green (v1/v2) is templated but
# NOT considered "implemented" until the image is real.
bentoml:
  enabled: false
  image:
    repository: invforge_demand_forecast
    # bentoml containerize tags images as <service>:<bento_version>; set this to
    # the real tag after building. Placeholder only.
    tag: local
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  containerPort: 3000
  # Blue-green: one Service selects the active color. Switch with
  # `make model-switch-green` / `make model-switch-blue` (kubectl patch).
  activeColor: blue
  versions:
    blue:
      enabled: true
      modelVersion: v1
    green:
      enabled: false
      modelVersion: v2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # BentoML images may run as root depending on how they were built; keep this
  # conservative but overridable. Verify before tightening readOnlyRootFilesystem.
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault
  # /healthz and /readyz are BentoML's default health endpoints (HTTP).
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# --- Retraining Job / CronJob (templates; opt-in) ---------------------------
# IMPORTANT: retraining needs the `ml` + `retraining` dependency groups (ZenML,
# Optuna, LightGBM) which the AI Ops runtime image deliberately EXCLUDES. So
# these use a SEPARATE image (invforge-retraining:local) built from
# deploy/k8s/Dockerfile.retraining via `make k8s-retrain-image`.
retraining:
  # One-shot manual Job. Create it on demand (templated; rendered only when
  # enabled). The Makefile target `make k8s-retrain` builds+loads the image and
  # creates the Job.
  job:
    enabled: false
  # Scheduled CronJob, suspended by default so it never runs unattended in a
  # demo cluster. Trigger manually by creating a Job from it (see runbook).
  cronjob:
    enabled: false
    schedule: "0 3 * * 0"  # weekly, Sundays 03:00 (only runs if suspend=false)
    suspend: true
  image:
    repository: invforge-retraining
    tag: local
    pullPolicy: IfNotPresent
  # Smoke mode is fast + deterministic and does NOT need a running server.
  mode: smoke
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault
  backoffLimit: 0  # do NOT retry: a failed retrain must fail safely, not loop.

# --- NetworkPolicy ----------------------------------------------------------
# See the prominent note in templates/networkpolicy.yaml. With kindnet (the kind
# default CNI) these are STRUCTURAL only and not enforced. Enable Calico for
# real enforcement (kind-config.yaml + docs/runbooks/k8s-startup.md).
networkPolicy:
  enabled: true

# --- Non-secret application configuration (ConfigMap) -----------------------
config:
  INVENTREE_BASE_URL: "http://inventree.localhost:8080"
  INVENTREE_TIMEOUT_SECONDS: "10"

# --- Secret (PLACEHOLDERS ONLY — never commit real values) ------------------
# Replace <CHANGE_ME> at deploy time (e.g. --set-string secret.INVENTREE_API_TOKEN=...)
# or use an external secret manager in production. NEVER commit real secrets.
secret:
  create: true
  INVENTREE_API_TOKEN: "<CHANGE_ME>"
  INVENTREE_PASSWORD: "<CHANGE_ME>"

# Common labels applied to all resources.
commonLabels:
  app.kubernetes.io/part-of: invforge
  invforge.io/layer: ai-operations
