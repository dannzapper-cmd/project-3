{{- /*
Secret template — PLACEHOLDER VALUES ONLY.

Never commit real secret values. The defaults in values.yaml are literally
"<CHANGE_ME>". Provide real values at deploy time WITHOUT committing them, e.g.:

  helm upgrade --install invforge deploy/k8s/helm/invforge -n invforge-ai \
    --set-string secret.INVENTREE_API_TOKEN="$INVENTREE_API_TOKEN"

In production, prefer an external secret store (e.g. External Secrets Operator,
cloud secret manager) over Helm values. The AI Ops API runs read-only in demo
mode by default, so these are not required for the basic PR-11A smoke.
*/}}
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "invforge.fullname" . }}-secret
  namespace: {{ include "invforge.namespace" . }}
  labels:
    {{- include "invforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-api
type: Opaque
stringData:
  INVENTREE_API_TOKEN: {{ .Values.secret.INVENTREE_API_TOKEN | quote }}
  INVENTREE_PASSWORD: {{ .Values.secret.INVENTREE_PASSWORD | quote }}
{{- end }}
