{{- /*
One-shot, manual retraining Job.

IMPORTANT — image: this uses invforge-retraining:local, NOT the AI Ops API image.
The AI Ops runtime image deliberately EXCLUDES the ml/retraining groups (ZenML,
Optuna, LightGBM) to stay small, so it would fail with ImportError here. Build
the retraining image with `make k8s-retrain-image` (deploy/k8s/Dockerfile.retraining),
load it into kind, then create this Job with `make k8s-retrain`.

ZenML local stack note: ZenML uses a local SQLite store (.zenml_local/). In a
Job this path is EPHEMERAL per run — it does NOT persist between runs. For
persistent pipeline state a PersistentVolumeClaim is required (deferred to
PR-11B or production). Smoke mode is deterministic and self-contained, so this
is fine for a demo.

Fail-safe: backoffLimit=0 means a failed retrain does NOT retry or loop. The
pipeline itself only promotes a model when its quality gate passes; a failed
command never promotes (see mlops/retraining/).
*/}}
{{- if .Values.retraining.job.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # Unique name per install revision so re-running creates a fresh Job.
  name: {{ include "invforge.fullname" . }}-retrain-{{ .Release.Revision }}
  namespace: {{ include "invforge.namespace" . }}
  labels:
    {{- include "invforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: retraining
spec:
  backoffLimit: {{ .Values.retraining.backoffLimit }}
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "invforge.labels" . | nindent 8 }}
        app.kubernetes.io/component: retraining
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: {{ .Values.retraining.securityContext.runAsNonRoot }}
        seccompProfile:
          {{- toYaml .Values.retraining.securityContext.seccompProfile | nindent 10 }}
      containers:
        - name: retrain
          image: "{{ .Values.retraining.image.repository }}:{{ .Values.retraining.image.tag }}"
          imagePullPolicy: {{ .Values.retraining.image.pullPolicy }}
          command: ["python", "-m", "mlops.retraining.runner", "retrain", "--mode", {{ .Values.retraining.mode | quote }}]
          env:
            - name: MLFLOW_ALLOW_FILE_STORE
              value: "true"
            - name: BENTOML_DO_NOT_TRACK
              value: "true"
            - name: ZENML_ANALYTICS_OPT_IN
              value: "false"
            - name: RETRAINING_MODE
              value: {{ .Values.retraining.mode | quote }}
          resources:
            {{- toYaml .Values.retraining.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.retraining.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.retraining.securityContext.capabilities | nindent 14 }}
{{- end }}
