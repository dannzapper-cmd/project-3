{{- /*
Embedded ephemeral PostgreSQL for Marquez (local/dev). Data is emptyDir — it is
intentionally lost on pod restart. The official postgres image uses a root
entrypoint that steps down to the postgres user, so runAsNonRoot is NOT forced
here (documented exception). Credentials are local-only throwaway values.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: marquez-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lineage.labels" . | nindent 4 }}
    app.kubernetes.io/component: marquez-db
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: marquez-db
  ports:
    - name: postgres
      port: {{ .Values.postgres.port }}
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lineage.labels" . | nindent 4 }}
    app.kubernetes.io/component: marquez-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: marquez-db
  template:
    metadata:
      labels:
        {{- include "lineage.labels" . | nindent 8 }}
        app.kubernetes.io/component: marquez-db
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.port }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
