apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  labels:
    {{- include "lineage.labels" . | nindent 4 }}
    app.kubernetes.io/component: namespace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lineage.labels" . | nindent 4 }}
    app.kubernetes.io/component: marquez-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: marquez-api
  template:
    metadata:
      labels:
        {{- include "lineage.labels" . | nindent 8 }}
        app.kubernetes.io/component: marquez-api
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # Marquez API runs DB migrations on startup; wait for the DB to accept
      # connections first so the container does not crash-loop on a cold start.
      initContainers:
        - name: wait-for-db
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h marquez-db -p {{ .Values.postgres.port }} -U {{ .Values.postgres.user }}; do
                echo "waiting for marquez-db..."; sleep 3;
              done
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
      containers:
        - name: marquez-api
          image: {{ .Values.marquezApi.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: MARQUEZ_PORT
              value: {{ .Values.marquezApi.port | quote }}
            - name: MARQUEZ_ADMIN_PORT
              value: {{ .Values.marquezApi.adminPort | quote }}
            - name: POSTGRES_HOST
              value: marquez-db
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.marquezApi.port }}
            - name: admin
              containerPort: {{ .Values.marquezApi.adminPort }}
          readinessProbe:
            httpGet: { path: /healthcheck, port: admin }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          resources:
            {{- toYaml .Values.marquezApi.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: marquez-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lineage.labels" . | nindent 4 }}
    app.kubernetes.io/component: marquez-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: marquez-api
  ports:
    - name: http
      port: {{ .Values.marquezApi.port }}
      targetPort: http
    - name: admin
      port: {{ .Values.marquezApi.adminPort }}
      targetPort: admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lineage.labels" . | nindent 4 }}
    app.kubernetes.io/component: marquez-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: marquez-web
  template:
    metadata:
      labels:
        {{- include "lineage.labels" . | nindent 8 }}
        app.kubernetes.io/component: marquez-web
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: marquez-web
          image: {{ .Values.marquezWeb.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: MARQUEZ_HOST
              value: marquez-api
            - name: MARQUEZ_PORT
              value: {{ .Values.marquezApi.port | quote }}
            - name: WEB_PORT
              value: {{ .Values.marquezWeb.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.marquezWeb.port }}
          resources:
            {{- toYaml .Values.marquezWeb.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: marquez-web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "lineage.labels" . | nindent 4 }}
    app.kubernetes.io/component: marquez-web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: marquez-web
  ports:
    - name: http
      port: {{ .Values.marquezWeb.port }}
      targetPort: http
