# InvForge reviewer demo scenario (synthetic, seed 42)
# Maps to categories/parts generated by data/synthetic/generate_inventory_data.py

scenario:
  name: mixed_demand_warehouse_review
  seed: 42
  operator: Acme Parts Co. warehouse manager

skus:
  - id: SKU-A100
    name: Hex Bolt M8 (regular mover)
    demand_pattern: regular
    avg_weekly_demand_units: 120
    supplier_lead_time_days: 7
    on_hand_units: 85
    stockout_risk: low
    review_focus: standard_reorder_point

  - id: SKU-B220
    name: Hydraulic Seal Kit (intermittent)
    demand_pattern: intermittent
    avg_weekly_demand_units: 4
    supplier_lead_time_days: 14
    on_hand_units: 6
    stockout_risk: medium
    review_focus: croston_style_forecast

  - id: SKU-C330
    name: Control Board PCB (rising demand)
    demand_pattern: regular_trend_up
    avg_weekly_demand_units: 45
    supplier_lead_time_days: 10
    on_hand_units: 22
    stockout_risk: high
    review_focus: urgent_reorder

  - id: SKU-D440
    name: Custom Bracket (long lead time)
    demand_pattern: low_volume
    avg_weekly_demand_units: 8
    supplier_lead_time_days: 21
    on_hand_units: 15
    stockout_risk: medium_high
    review_focus: safety_stock_buffer

what_if:
  - description: Supplier lead time for SKU-D440 increases 21 → 28 days
    expected_effect: higher safety stock and earlier reorder point

expected_dashboard:
  overview: all_artifact_families_present
  forecast_panel: champion_challenger_comparison_visible
  decision_panel:
    high_priority_skus: [SKU-C330, SKU-D440]
  mlops_panel: drift_and_registry_summary_visible

expected_business_decision:
  reorder_now: [SKU-C330]
  increase_safety_stock: [SKU-D440]
  standard_rop_review: [SKU-A100]
  intermittent_caution: [SKU-B220]

claims_safe:
  - synthetic_pipeline_runs_locally
  - dashboard_reflects_generated_artifacts
  - read_only_api_surfaces_available

claims_not_safe:
  - real_world_cost_savings
  - production_deployment_without_live_evidence
