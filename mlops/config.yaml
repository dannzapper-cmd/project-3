# PR-05 MLOps loop configuration.
#
# Local, offline, deterministic. No external services, no cloud, no Kubernetes.
# This file only configures the PR-05 monitoring/packaging loop. It never
# changes PR-03 forecast metrics or PR-04 decision metrics.

mlflow:
  tracking_uri: mlruns
  forecast_experiment: demand_forecast_baseline
  forecast_model_artifact: lightgbm_model
  registered_model_name: demand_forecast
  champion_alias: champion
  # Tag used to make registration idempotent (skip if a version already maps
  # to the same source run).
  champion_run_tag: pr05_champion_run_id

data:
  synthetic_dir: data/synthetic/output
  demand_history_file: demand_history.csv
  parts_file: parts.csv

artifacts:
  root: artifacts/mlops

evidently:
  # Reference = first reference_fraction of distinct dates (sorted ascending).
  # Current = the remaining dates. This is a strict temporal boundary split,
  # never a random sample, so no current-period dates leak into the reference.
  reference_fraction: 0.80
  # Dataset-level drift is flagged when the share of drifted columns meets or
  # exceeds this threshold (Evidently DriftedColumnsCount drift_share).
  drift_share_threshold: 0.5
  # Per-column drift test significance threshold (p-value based tests).
  # Documented here for transparency; Evidently selects the stat test per
  # column type automatically.
  per_column_pvalue_threshold: 0.05
  # Columns analysed for drift / quality. If omitted, sensible defaults are
  # derived from the engineered feature table. Missing columns cause a clear
  # failure rather than silent nonsense.
  numerical_columns:
    - quantity_demand
    - lag_7
    - lag_14
    - lag_28
    - rolling_mean_7
    - rolling_mean_28
    - rolling_std_28
    - lead_time_days
    - day_of_week
    - month
    - week_of_year
  categorical_columns:
    - category_id
    - supplier_id
    - is_weekend
    - demand_pattern_intermittent

champion_challenger:
  # Both models come from the same PR-03 temporal split. The champion is the
  # current/primary demand forecasting model (global LightGBM); the challenger
  # is the StatsForecast statistical baseline.
  champion_model: lightgbm
  challenger_model: statsforecast
  primary_metric: mae
  primary_metric_direction: lower_is_better
  # Relative improvement on the primary metric (percent) required to declare a
  # winner. Below this the decision is "manual_review".
  decision_threshold_pct: 5.0
  # Existing PR-04 decision-intelligence summary used for synthetic supporting
  # context only (never recomputed, never mutated).
  pr04_summary_path: artifacts/decision/decision_summary.json

bentoml:
  enabled: true
  model_name: invforge_demand_forecast

# PR-09 local retraining pipeline (ZenML + Optuna + safe rollback).
#
# Local, offline, deterministic. Smoke mode is fast and bounded; full mode keeps
# conservative defaults. Hard bounds on Optuna trials are also enforced in code
# (smoke <= 3, full <= 20) so config edits cannot trigger expensive tuning.
retraining:
  pipeline_name: invforge_retraining
  primary_metric: mae
  metric_direction: lower_is_better
  # Minimum relative improvement (percent) on the primary metric required to
  # promote a candidate over the current champion. Conservative by default.
  promotion_threshold_pct: 5.0
  random_seed: 42
  artifacts_dir: artifacts/retraining
  modes:
    smoke:
      max_items: 10
      max_days: 90
      lightgbm_n_estimators: 60
      optuna_trials: 2
      optuna_timeout_seconds: 60
    full:
      max_items: null
      max_days: null
      lightgbm_n_estimators: 200
      optuna_trials: 15
      optuna_timeout_seconds: 600
  optuna:
    # Tuning is OPTIONAL and OFF by default. Enable per-run via --tune / env.
    enabled_default: false
  mlflow:
    tracking_uri: mlruns
    # Dedicated experiment for retraining runs (kept separate from PR-03).
    experiment_name: demand_forecast_retraining
    # Source experiment used only to bootstrap a champion if no registry alias
    # exists yet (read-only).
    forecast_experiment: demand_forecast_baseline
    # Reuse the PR-05 registry/alias conventions exactly.
    registered_model_name: demand_forecast
    champion_alias: champion
    previous_champion_alias: previous_champion
    model_artifact: lightgbm_model
    candidate_tag: pr09_candidate_run_id
  bentoml:
    # Reuse PR-05 packaging after a promotion only. Off by default so
    # retrain-smoke never requires BentoML.
    enabled: false
    model_name: invforge_demand_forecast
