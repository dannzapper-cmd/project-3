# Supply chain provenance groundwork. NOT a CI gate.
# Requires: a GHCR image (pushed by you), GHCR write + OIDC id-token permission,
# and an image reference/tag. Run manually AFTER confirming prerequisites. This
# is keyless (Sigstore/Fulcio) signing — no long-lived keys to manage.
#
# It is intentionally workflow_dispatch ONLY (never on push/PR) and is NOT wired
# into ci.yml, so it can never block PR-11A checks. If GHCR is not configured,
# the verify step is informational and the job still completes. Promotion to a
# real deploy gate (sign in CI, verify before k8s admission) is deferred to
# PR-11B / production. See docs/runbooks/k8s-startup.md ("Model/image signing").
name: cosign-model-signing

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Full OCI image ref to sign (e.g. ghcr.io/owner/invforge-ai-ops:tag)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write  # keyless signing via GitHub OIDC

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign --yes "${{ inputs.image_ref }}"

      - name: Verify signature (informational)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign verify \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            "${{ inputs.image_ref }}" || \
            echo "Verify is informational here; wire strict policy in PR-11B."
