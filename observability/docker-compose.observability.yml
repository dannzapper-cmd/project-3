# Fully independent, local/dev observability stack for the InvForge AI
# Operations Layer (PR-07).
#
# HARD RULES (B6):
#   * This file is self-contained. It does NOT use `extends` or `include`
#     against any InvenTree / app compose file.
#   * It shares NO named volumes with InvenTree.
#   * It creates and uses its own bridge network `invforge-observability`.
#   * Prometheus scrapes ONLY the InvForge AI Operations API /metrics endpoint
#     (configured in observability/prometheus/prometheus.yml).
#
# The API itself is NOT started here — run it on the host with
# `make observability-api` (or `make api-dev`). Prometheus reaches it via
# `host.docker.internal:8001`. On Linux, the `extra_hosts` host-gateway entry
# below makes that name resolve to the host; on Docker Desktop (macOS/Windows)
# it resolves automatically (PATCH 5).
#
# This is local/dev observability only. It makes no production claims.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: invforge-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2h
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - invforge-observability

  grafana:
    image: grafana/grafana:11.2.0
    container_name: invforge-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      # Local-only dev credentials. NOT for production use.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - invforge-observability

volumes:
  prometheus-data:
    name: invforge-observability-prometheus-data
  grafana-data:
    name: invforge-observability-grafana-data

networks:
  invforge-observability:
    name: invforge-observability
    driver: bridge
