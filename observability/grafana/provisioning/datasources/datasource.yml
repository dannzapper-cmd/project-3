# Local/dev Grafana datasource provisioning for InvForge observability.
# Points Grafana at the Prometheus instance defined in the observability
# compose file. Local/dev only.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
