# Local/dev Prometheus config for the InvForge AI Operations observability layer.
#
# Scope: scrape ONLY the InvForge AI Operations API /metrics endpoint. It does
# NOT scrape InvenTree or any other service. This is local/dev observability
# only — not a production monitoring configuration.
#
# Host resolution (PATCH 5): on Docker Desktop (macOS/Windows) the API runs on
# the host, so we scrape `host.docker.internal:8001`. On Linux, run compose
# with `--add-host=host.docker.internal:host-gateway` (already set in
# observability/docker-compose.observability.yml) so the same target resolves.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    project: invforge
    environment: local-dev

scrape_configs:
  - job_name: invforge-ai-ops-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8001
        labels:
          service: invforge-ai-ops-api
